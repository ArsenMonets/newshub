name: SonarQube

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  build:
    name: Build and analyze
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'zulu'

      - name: Set up Node.js (Updated to v22)
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Cache SonarQube packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Build and analyze Backend
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          cd newshub_backend
          # Додано -e для виведення детального стек-трейсу помилки, якщо вона станеться
          mvn -e verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.token=$SONAR_TOKEN \
            -Dsonar.organization=arsenmonets \
            -Dsonar.projectKey=ArsenMonets_newshub_backend \
            -Dsonar.projectName="NewsHub Backend" \
            -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml

      - name: Build and analyze Frontend
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          cd newshub_frontend
          npm ci
          npm run test -- --watch=false --code-coverage --browsers=ChromeHeadless
          
          npm install -g sonarqube-scanner
          sonar-scanner \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.token=$SONAR_TOKEN \
            -Dsonar.organization=arsenmonets \
            -Dsonar.projectKey=ArsenMonets_newshub_frontend \
            -Dsonar.projectName="NewsHub Frontend" \
            -Dsonar.sources=src \
            -Dsonar.tests=src \
            -Dsonar.test.inclusions="**/*.spec.ts" \
            -Dsonar.exclusions="**/*.spec.ts, node_modules/**" \
            -Dsonar.typescript.lcov.reportPaths=coverage/**/lcov.info
