<article *ngIf="news() as n" class="news-article">
  <header>
    <div class="category">{{ n.category.name }}</div>
    <h1>{{ n.title }}</h1>
    <div class="meta">
      <span>By {{ n.author.login }}</span>
      <span>{{ n.createdAt | date:'long' }}</span>
    </div>
    <div class="actions" *ngIf="authAPI.user()">
      <button (click)="subscribeToAuthor(n.author.id)">Follow Author</button>
      <button (click)="subscribeToCategory(n.category.id)">Subscribe to Category</button>
      <button *ngIf="canEditOrDelete()" (click)="editNews()" style="background: #3498db; color: white;">Edit</button>
      <button *ngIf="canEditOrDelete()" (click)="deleteNews()" style="background: #e74c3c; color: white;">Delete</button>
    </div>
  </header>
  
  <p class="summary"><strong>Summary:</strong> {{ n.summary }}</p>
  
  <div class="content">
    {{ n.content }}
  </div>
</article>
