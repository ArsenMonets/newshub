<div class="auth-form">
  <h1>Register</h1>
  <form (submit)="onRegister()">
    <div class="field">
      <label for="reg-login">Login</label>
      <input id="reg-login" type="text" [(ngModel)]="regData.login" name="login" required>
    </div>
    <div class="field">
      <label for="reg-email">Email</label>
      <input id="reg-email" type="email" [(ngModel)]="regData.email" name="email" required>
    </div>
    <div class="field">
      <label for="reg-pass">Password</label>
      <input id="reg-pass" type="password" [(ngModel)]="regData.password" name="password" required>
    </div>
    <button type="submit" [disabled]="loading()">Register</button>
  </form>
</div>
