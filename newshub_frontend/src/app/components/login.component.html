<div class="auth-form">
  <h1>Login</h1>
  <form (submit)="onLogin()">
    <div class="field">
      <label for="login-user">Username (Login)</label>
      <input id="login-user" type="text" [(ngModel)]="loginData.login" name="login" required>
    </div>
    <div class="field">
      <label for="login-pass">Password</label>
      <input id="login-pass" type="password" [(ngModel)]="loginData.password" name="password" required>
    </div>
    <button type="submit" [disabled]="loading()">Login</button>
  </form>
</div>
